<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육공무직 급여 AI 상담봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            background: linear-gradient(180deg, #f0f4f0 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }
        .main-container {
            width: 100%;
            max-width: 850px;
            margin-top: 4vh;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bot-logo {
            width: 70px; height: 70px;
            background: #16a34a; color: white;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.15);
        }
        #chat-area {
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.06);
            margin-top: 30px;
            border: 1px solid rgba(229, 231, 235, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #chatBox {
            height: 500px;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        #chatBox::-webkit-scrollbar { width: 5px; }
        #chatBox::-webkit-scrollbar-track { background: transparent; }
        #chatBox::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; }
        
        .msg-bubble {
            max-width: 80%; padding: 12px 18px;
            font-size: 15px; line-height: 1.7; word-break: keep-all;
            position: relative;
        }
        .msg-bubble.user {
            background: #16a34a; color: #fff;
            border-radius: 20px 20px 4px 20px;
        }
        .msg-bubble.ai {
            background: #f1f5f1; color: #1e293b;
            border-radius: 20px 20px 20px 4px;
        }
        .msg-bubble.ai a {
            color: #16a34a;
            text-decoration: underline;
            font-weight: 600;
        }
        .ai-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #16a34a, #15803d);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: #fff; font-weight: 800; flex-shrink: 0;
        }
        .input-bar {
            padding: 16px 20px;
            border-top: 1px solid #f1f5f1;
            display: flex; gap: 10px;
            background: #fafbfa;
        }
        .input-bar input {
            flex: 1; padding: 14px 20px;
            border: 2px solid #e2e8e0; border-radius: 16px;
            outline: none; font-size: 15px; font-family: inherit;
            transition: all 0.2s; background: #fff;
        }
        .input-bar input:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.08);
        }
        .input-bar button {
            padding: 14px 24px; background: #16a34a; color: #fff;
            border: none; border-radius: 16px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: all 0.15s; white-space: nowrap;
        }
        .input-bar button:hover { background: #15803d; transform: translateY(-1px); }
        .input-bar button:active { transform: translateY(0); }
        .input-bar button:disabled { background: #86efac; cursor: not-allowed; }

        .typing-indicator { display: none; padding: 0 24px 12px; }
        .typing-indicator.show { display: flex; }
        .typing-dots {
            display: flex; gap: 5px; align-items: center;
            padding: 10px 16px; background: #f1f5f1;
            border-radius: 20px 20px 20px 4px; margin-left: 40px;
        }
        .typing-dots span {
            width: 6px; height: 6px; background: #94a3b8;
            border-radius: 50%; animation: dotBounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .quick-btns {
            display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;
            padding: 14px 20px; background: #f8faf8; border-bottom: 1px solid #f1f5f1;
        }
        .quick-btn {
            padding: 6px 14px; border: 1.5px solid #e2e8e0; border-radius: 20px;
            background: #fff; font-size: 13px; font-weight: 600; color: #64748b;
            cursor: pointer; transition: all 0.15s;
        }
        .quick-btn:hover { background: #16a34a; color: #fff; border-color: #16a34a; }

        .footer-text { margin-top: 40px; color: #94a3b8; font-size: 12px; }

        .elapsed-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 8px;
            background: #dcfce7;
            color: #166534;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="bot-logo">💰</div>
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-3 tracking-tight">교육공무직 급여 AI 상담봇</h1>
        <p class="text-base text-gray-500 leading-relaxed max-w-2xl mx-auto font-medium">
            교육공무직원의 급여, 수당, 인사, 복무 관련 궁금한 점을 물어보세요.<br class="hidden md:block">
            관련 규정과 계산 근거를 함께 안내해 드립니다.
        </p>

        <div id="chat-area">
            <div id="chatBox">
                <div class="msg-row ai">
                    <div class="ai-icon">💰</div>
                    <div class="msg-bubble ai">안녕하세요! 교육공무직 급여 AI 상담봇 셀팝이입니다. 급여, 수당, 인사, 복무 등 궁금한 점을 편하게 물어보세요 😊</div>
                </div>
            </div>

            <div class="typing-indicator" id="loading">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="input-bar">
                <input type="text" id="userInput" placeholder="급여 관련 궁금한 점을 입력하세요..." autocomplete="off">
                <button onclick="sendMessage()" id="sendBtn">전송</button>
            </div>
        </div>

        <div class="footer-text">
            <p class="font-semibold text-gray-400">본 서비스는 교육공무직원 급여 관련 규정 자료를 바탕으로 답변을 생성합니다.</p>
            <p class="mt-2 text-[11px] opacity-40">AI 답변은 참고용이며, 정확한 사항은 소속 기관 인사/급여 담당자에게 확인하세요.</p>
        </div>
    </div>

    <script>
        // ★ Apps Script 웹 앱 배포 URL로 교체하세요
        var API_URL = 'https://script.google.com/macros/s/AKfycbx7QntTFFk32Ld4b6ZQiYRTGC76cxHtqqldIFMOvfSxV5dfjlC7Kfm98G7p2u_K5wLH/exec';

        var isProcessing = false;

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatAnswer(text) {
            if (!text) return '답변을 가져오지 못했습니다.';
            return escapeHtml(text)
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/(^|[^"'])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank">바로가기</a>');
        }

        function addMessage(text, isUser, elapsed) {
            var chatBox = document.getElementById('chatBox');
            var row = document.createElement('div');
            row.className = isUser ? 'msg-row user' : 'msg-row ai';
            
            var elapsedHtml = '';
            if (!isUser && elapsed) {
                elapsedHtml = '<div class="elapsed-badge">⏱ ' + elapsed.toFixed(1) + '초</div>';
            }

            if (isUser) {
                row.innerHTML = '<div class="msg-bubble user">' + escapeHtml(text) + '</div>';
            } else {
                row.innerHTML = '<div class="ai-icon">💰</div><div class="msg-bubble ai">' + formatAnswer(text) + elapsedHtml + '</div>';
            }
            
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function getTodayString() {
            var now = new Date();
            var days = ['일', '월', '화', '수', '목', '금', '토'];
            return now.getFullYear() + '년 ' + (now.getMonth() + 1) + '월 ' + now.getDate() + '일 ' + days[now.getDay()] + '요일';
        }

        function askQuick(question) {
            document.getElementById('userInput').value = question;
            sendMessage();
        }

        function sendMessage() {
            if (isProcessing) return;

            var input = document.getElementById('userInput');
            var text = input.value.trim();
            if (!text) return;

            isProcessing = true;
            input.value = '';
            
            addMessage(text, true);
            
            var loading = document.getElementById('loading');
            var sendBtn = document.getElementById('sendBtn');
            loading.classList.add('show');
            sendBtn.disabled = true;

            var queryForAi = '[현재 일시: ' + getTodayString() + '] ' + text;
            var fetchStartTime = performance.now();

            var callbackName = '_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);

            window[callbackName] = function(data) {
                var clientElapsed = (performance.now() - fetchStartTime) / 1000;
                loading.classList.remove('show');

                if (data && data.answer) {
                    var elapsed = data.elapsed || clientElapsed;
                    addMessage(data.answer, false, elapsed);
                } else {
                    addMessage('답변을 가져오지 못했습니다. 다시 시도해 주세요.', false);
                }

                isProcessing = false;
                sendBtn.disabled = false;
                input.focus();

                delete window[callbackName];
                if (scriptTag.parentNode) scriptTag.parentNode.removeChild(scriptTag);
            };

            var scriptTag = document.createElement('script');
            scriptTag.src = API_URL + '?q=' + encodeURIComponent(queryForAi) + '&callback=' + callbackName;

            scriptTag.onerror = function() {
                loading.classList.remove('show');
                addMessage('서버 연결에 실패했습니다. 잠시 후 다시 시도해 주세요.', false);
                isProcessing = false;
                sendBtn.disabled = false;
                input.focus();
                delete window[callbackName];
                if (scriptTag.parentNode) scriptTag.parentNode.removeChild(scriptTag);
            };

            setTimeout(function() {
                if (window[callbackName]) {
                    loading.classList.remove('show');
                    addMessage('응답 시간이 초과되었습니다. 다시 시도해 주세요.', false);
                    isProcessing = false;
                    sendBtn.disabled = false;
                    delete window[callbackName];
                    if (scriptTag.parentNode) scriptTag.parentNode.removeChild(scriptTag);
                }
            }, 120000);

            document.body.appendChild(scriptTag);
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        window.onload = function() { document.getElementById('userInput').focus(); };
    </script>
</body>
</html>
