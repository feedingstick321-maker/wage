<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원인행위-지출결의 차액 분석기</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (React 18) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (JSX 문법을 브라우저가 이해할 수 있게 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- SheetJS (엑셀 파일 처리용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <!-- type="text/babel" 속성이 있어야 브라우저에서 React 코드가 실행됩니다 -->
  <script type="text/babel">
    const { useState, useCallback, useMemo, useEffect } = React;

    // 외부 라이브러리(lucide-react) 오류를 방지하기 위해 사용된 아이콘을 직접 SVG로 구현
    const Icons = {
      Upload: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      FileText: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      AlertCircle: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      CheckCircle: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      Download: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      RefreshCw: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
      Search: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Filter: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
      FileSpreadsheet: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>,
      Info: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
      Lightbulb: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
    };

    function App() {
      const [data, setData] = useState([]);
      const [fileName, setFileName] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [error, setError] = useState('');
      const [filterText, setFilterText] = useState('');
      const [showOnlyDiff, setShowOnlyDiff] = useState(true);

      // CSV 파싱 로직 (따옴표 내 쉼표 처리)
      const parseCSV = (text) => {
        const result = [];
        let row = [];
        let inQuotes = false;
        let val = '';
        
        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          if (char === '"') {
            if (inQuotes && text[i + 1] === '"') {
              val += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === ',' && !inQuotes) {
            row.push(val.trim());
            val = '';
          } else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && text[i + 1] === '\n') i++;
            row.push(val.trim());
            if (row.some(c => c)) result.push(row); // 빈 줄 무시
            row = [];
            val = '';
          } else {
            val += char;
          }
        }
        if (row.length || val) {
          row.push(val.trim());
          result.push(row);
        }
        return result;
      };

      // 공통 데이터 처리 로직 (CSV, Excel 모두 2차원 배열 형태로 받아서 처리)
      const processDataGrid = useCallback((rows) => {
        if (!rows || rows.length < 2) {
          setError('데이터가 없거나 올바르지 않은 형식입니다.');
          return;
        }

        // 1. 헤더 행 찾기 (원인행위금액이 포함된 행)
        let headerIdx = -1;
        for (let i = 0; i < Math.min(20, rows.length); i++) {
          if (rows[i] && Array.isArray(rows[i]) && rows[i].some(col => String(col).includes('원인행위금액') || String(col).includes('원인행위액'))) {
            headerIdx = i;
            break;
          }
        }

        if (headerIdx === -1) {
          setError('파일에서 [원인행위금액] 열을 찾을 수 없습니다.');
          return;
        }

        const headers = rows[headerIdx].map(String);
        
        // 2. 주요 컬럼 인덱스 매핑 (유연한 매칭)
        const colMap = {
          no: headers.findIndex(h => h.includes('번호')),
          date: headers.findIndex(h => h.includes('일자')),
          type: headers.findIndex(h => h.includes('유형')),
          title: headers.findIndex(h => h.includes('제목') || h.includes('적요')),
          causeAmt: headers.findIndex(h => h.replace(/\s/g, '').includes('원인행위금액') || h.includes('원인행위액')),
          resAmt: headers.findIndex(h => h.replace(/\s/g, '').includes('결의확정액') || h.includes('지출결의액')),
          availAmt: headers.findIndex(h => h.replace(/\s/g, '').includes('결의가능금액')),
        };

        if (colMap.causeAmt === -1 || colMap.resAmt === -1) {
          setError('필수 열(원인행위금액, 결의확정액)을 모두 찾을 수 없습니다.');
          return;
        }

        // 엑셀은 숫자형태로, CSV는 문자열 형태로 들어오므로 통합 처리
        const parseNum = (val) => {
          if (typeof val === 'number') return val;
          return parseInt(String(val || '0').replace(/,/g, ''), 10) || 0;
        };

        // 날짜 포맷팅 함수 (엑셀 일련번호 및 YYYYMMDD 형태 처리)
        const formatDate = (val) => {
          if (!val) return '-';
          const strVal = String(val).trim();
          
          // 1. 엑셀 날짜 일련번호 (예: 45000 -> 2023-03-22)
          if (!isNaN(strVal) && Number(strVal) > 30000 && Number(strVal) < 60000) {
            const date = new Date(Math.round((Number(strVal) - 25569) * 86400 * 1000));
            const y = date.getUTCFullYear();
            const m = String(date.getUTCMonth() + 1).padStart(2, '0');
            const d = String(date.getUTCDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
          }
          
          // 2. YYYYMMDD 형태의 문자열 (예: 20240228 -> 2024-02-28)
          if (strVal.length === 8 && !isNaN(strVal)) {
            return `${strVal.substring(0,4)}-${strVal.substring(4,6)}-${strVal.substring(6,8)}`;
          }
          
          // 3. 이미 하이픈이 포함되어 있거나 기타 문자열인 경우 원본 반환
          return strVal;
        };

        // 3. 데이터 객체화 및 차액 계산
        const parsedData = rows.slice(headerIdx + 1).map((row, index) => {
          if (!row || row.length === 0) return null;

          const causeAmt = parseNum(row[colMap.causeAmt]);
          const resAmt = parseNum(row[colMap.resAmt]);
          // 결의가능금액이 있으면 사용하고, 없으면 직접 계산
          const availAmt = colMap.availAmt !== -1 ? parseNum(row[colMap.availAmt]) : (causeAmt - resAmt);

          return {
            id: index,
            no: colMap.no !== -1 ? String(row[colMap.no] || '-') : '-',
            date: colMap.date !== -1 ? formatDate(row[colMap.date]) : '-',
            type: colMap.type !== -1 ? String(row[colMap.type] || '-') : '-',
            title: colMap.title !== -1 ? String(row[colMap.title] || '-') : '-',
            causeAmt,
            resAmt,
            availAmt,
            hasDiff: availAmt !== 0 || causeAmt !== resAmt,
          };
        }).filter(item => item && item.title && item.title !== '-'); // 빈 데이터 필터링

        if (parsedData.length === 0) {
          setError('추출할 수 있는 유효한 데이터가 없습니다.');
          return;
        }

        setData(parsedData);
      }, []);

      // 파일 확장자 판별 및 분기 처리
      const processFile = useCallback((file) => {
        setFileName(file.name);
        setError('');
        
        const isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');
        const isCSV = file.name.endsWith('.csv');

        if (!isExcel && !isCSV) {
          setError('지원하지 않는 파일 형식입니다. CSV 또는 Excel(.xlsx, .xls) 파일을 업로드해주세요.');
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            if (isExcel) {
              if (!window.XLSX) {
                setError('엑셀 변환 라이브러리를 불러오는 중입니다. 잠시 후 다시 업로드해주세요.');
                return;
              }
              const data = new Uint8Array(e.target.result);
              const workbook = window.XLSX.read(data, { type: 'array' });
              const firstSheetName = workbook.SheetNames[0];
              const worksheet = workbook.Sheets[firstSheetName];
              const rows = window.XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
              processDataGrid(rows);
            } else {
              // CSV 파일 처리 로직 (인코딩 자동 감지)
              const buffer = e.target.result;
              let text = new TextDecoder('utf-8').decode(buffer);
              // 웹 브라우저 호환성을 위해 한글 깨짐 문자() 감지 시 EUC-KR로 재시도
              if (text.includes('')) { 
                text = new TextDecoder('euc-kr').decode(buffer);
              }
              const rows = parseCSV(text);
              processDataGrid(rows);
            }
          } catch (err) {
            setError('파일을 분석하는 중 오류가 발생했습니다. 파일이 손상되었는지 확인해주세요.');
            console.error(err);
          }
        };
        
        reader.readAsArrayBuffer(file);
      }, [processDataGrid]);

      const handleDragOver = (e) => {
        e.preventDefault();
        setIsDragging(true);
      };

      const handleDragLeave = (e) => {
        e.preventDefault();
        setIsDragging(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        const file = e.dataTransfer.files[0];
        if (file) processFile(file);
      };

      const handleFileInput = (e) => {
        const file = e.target.files[0];
        if (file) processFile(file);
      };

      const exportToCSV = () => {
        if (!filteredData.length) return;
        
        const headers = ['번호', '일자', '유형', '제목', '원인행위금액', '결의확정액', '차액(결의가능금액)'];
        const csvRows = [
          headers.join(','),
          ...filteredData.map(row => [
            row.no,
            row.date,
            `"${row.type}"`,
            `"${row.title.replace(/"/g, '""')}"`, // 이스케이프 처리
            row.causeAmt,
            row.resAmt,
            row.availAmt
          ].join(','))
        ];
        
        const csvContent = "\uFEFF" + csvRows.join('\n'); // BOM for Excel UTF-8
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', `원인행위_차액분석결과_${new Date().getTime()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // 필터링 및 통계 계산
      const filteredData = useMemo(() => {
        return data.filter(item => {
          const matchText = item.title.toLowerCase().includes(filterText.toLowerCase()) || 
                            item.no.toLowerCase().includes(filterText.toLowerCase());
          const matchDiff = showOnlyDiff ? item.hasDiff : true;
          return matchText && matchDiff;
        });
      }, [data, filterText, showOnlyDiff]);

      const stats = useMemo(() => {
        const totalCount = data.length;
        const diffCount = data.filter(d => d.hasDiff).length;
        const totalCause = data.reduce((sum, d) => sum + d.causeAmt, 0);
        const totalDiff = data.reduce((sum, d) => sum + d.availAmt, 0);
        
        return { totalCount, diffCount, totalCause, totalDiff };
      }, [data]);

      const formatMoney = (num) => new Intl.NumberFormat('ko-KR').format(num) + '원';

      // --- 화면 렌더링 ---
      if (data.length === 0) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 font-sans">
            <div className="max-w-4xl w-full space-y-6">
              {/* Main Upload Card */}
              <div className="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
                <div className="text-center mb-8">
                  <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <Icons.FileSpreadsheet className="text-blue-600 w-8 h-8" />
                  </div>
                  <h1 className="text-2xl font-bold text-gray-800">원인행위-지출결의 차액 분석기</h1>
                  <p className="text-gray-500 mt-2">에듀파인 원인행위 목록을 업로드하여<br/>금액이 불일치하는 항목을 자동으로 찾아냅니다.</p>
                </div>

                <div
                  className={`border-2 border-dashed rounded-xl p-10 text-center transition-colors ${
                    isDragging ? 'border-blue-500 bg-blue-50' : 'border-gray-300 hover:border-blue-400 hover:bg-gray-50'
                  }`}
                  onDragOver={handleDragOver}
                  onDragLeave={handleDragLeave}
                  onDrop={handleDrop}
                >
                  <input
                    type="file"
                    id="file-upload"
                    className="hidden"
                    accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel"
                    onChange={handleFileInput}
                  />
                  <label htmlFor="file-upload" className="cursor-pointer flex flex-col items-center">
                    <Icons.Upload className={`w-12 h-12 mb-4 ${isDragging ? 'text-blue-500' : 'text-gray-400'}`} />
                    <span className="text-lg font-medium text-gray-700">여기로 파일을 드래그하거나 클릭하여 업로드</span>
                    <div className="flex gap-2 mt-3">
                      <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-semibold">.xlsx (Excel)</span>
                      <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-semibold">.csv</span>
                    </div>
                  </label>
                </div>
                
                {error && (
                  <div className="mt-4 p-4 bg-red-50 text-red-600 rounded-lg flex items-center">
                    <Icons.AlertCircle className="w-5 h-5 mr-2 flex-shrink-0" />
                    <span className="text-sm font-medium">{error}</span>
                  </div>
                )}
              </div>

              {/* Instructions Card */}
              <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                <div className="flex items-center mb-6">
                  <Icons.Info className="w-6 h-6 text-blue-500 mr-2" />
                  <h2 className="text-xl font-bold text-gray-800">프로그램 사용법</h2>
                </div>
                
                <div className="flex flex-col md:flex-row gap-8 items-stretch">
                  <div className="w-full md:w-1/2 bg-white rounded-xl border border-gray-200 flex flex-col items-center justify-center p-2 min-h-[200px] relative shadow-inner group">
                    <a 
                      href="https://feedingstick321-maker.github.io/wage/use1.png" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="w-full h-full relative block cursor-pointer overflow-hidden rounded-lg"
                      title="클릭하여 원본 크기로 보기"
                    >
                      <img 
                        src="https://feedingstick321-maker.github.io/wage/use1.png" 
                        alt="[에듀파인 화면 안내]" 
                        className="w-full h-full object-contain transition-transform duration-300 group-hover:scale-[1.02]" 
                      />
                      <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                        <div className="bg-white/95 text-gray-800 px-4 py-2 rounded-full text-sm font-bold flex items-center shadow-lg transform translate-y-2 group-hover:translate-y-0 transition-all duration-300">
                          <Icons.Search className="w-4 h-4 mr-2 text-blue-600" />
                          크게 보기
                        </div>
                      </div>
                    </a>
                  </div>

                  <div className="w-full md:w-1/2 flex flex-col justify-center">
                    <ol className="space-y-4 text-sm text-gray-700">
                      <li className="flex items-start">
                        <span className="flex items-center justify-center w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mr-3 shrink-0">1</span>
                        <span className="mt-0.5">K-에듀파인 <strong className="text-gray-900">원인행위</strong> 메뉴로 이동</span>
                      </li>
                      <li className="flex items-start">
                        <span className="flex items-center justify-center w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mr-3 shrink-0">2</span>
                        <span className="mt-0.5">목록 우측 상단의 <strong className="text-gray-900">전체보기</strong> 클릭</span>
                      </li>
                      <li className="flex items-start">
                        <span className="flex items-center justify-center w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mr-3 shrink-0">3</span>
                        <span className="mt-0.5"><strong className="text-blue-600">엑셀 다운로드</strong> 버튼을 눌러 파일 저장</span>
                      </li>
                      <li className="flex items-start">
                        <span className="flex items-center justify-center w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mr-3 shrink-0">4</span>
                        <span className="mt-0.5">다운로드한 파일을 본 프로그램 위 점선 영역에 업로드</span>
                      </li>
                    </ol>

                    <div className="mt-6 bg-amber-50 rounded-xl p-4 border border-amber-200 flex items-start">
                      <Icons.Lightbulb className="w-6 h-6 text-amber-500 mr-3 shrink-0" />
                      <div>
                        <h4 className="font-bold text-amber-900 text-sm mb-1">회계 마감 시 유용합니다!</h4>
                        <p className="text-xs text-amber-800 leading-relaxed">
                          연말이나 회계 연도 마감 시, 수많은 내역 중 지출결의가 완전히 끝나지 않아 <strong>미결의 잔액이 남아있는 건</strong>을 한눈에 빠르고 정확하게 찾아낼 수 있습니다.
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50 p-6 font-sans">
          <div className="max-w-7xl mx-auto space-y-6">
            
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <div>
                <h1 className="text-2xl font-bold text-gray-800 flex items-center">
                  <Icons.FileText className="w-6 h-6 mr-2 text-blue-600" />
                  차액 분석 결과
                </h1>
                <p className="text-gray-500 mt-1 flex items-center">
                  <span className="bg-gray-100 px-2 py-1 rounded text-xs font-mono mr-2">{fileName}</span>
                  데이터 분석 완료
                </p>
              </div>
              <div className="mt-4 md:mt-0 flex space-x-3">
                <button 
                  onClick={exportToCSV}
                  className="flex items-center px-4 py-2 bg-green-50 text-green-700 hover:bg-green-100 rounded-lg font-medium transition-colors"
                >
                  <Icons.Download className="w-4 h-4 mr-2" />
                  CSV 저장
                </button>
                <button 
                  onClick={() => { setData([]); setFileName(''); }}
                  className="flex items-center px-4 py-2 border border-gray-300 text-gray-700 hover:bg-gray-50 rounded-lg font-medium transition-colors"
                >
                  <Icons.RefreshCw className="w-4 h-4 mr-2" />
                  다시하기
                </button>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="text-sm font-medium text-gray-500 mb-1">총 원인행위 건수</h3>
                <p className="text-3xl font-bold text-gray-800">{stats.totalCount}건</p>
                <p className="text-sm text-gray-400 mt-2">총액: {formatMoney(stats.totalCause)}</p>
              </div>
              <div className="bg-white p-6 rounded-2xl shadow-sm border-2 border-red-100 bg-red-50/30">
                <div className="flex items-start justify-between">
                  <div>
                    <h3 className="text-sm font-medium text-red-600 mb-1 flex items-center">
                      <Icons.AlertCircle className="w-4 h-4 mr-1" />
                      차액 발생(미결의) 건수
                    </h3>
                    <p className="text-3xl font-bold text-red-600">{stats.diffCount}건</p>
                  </div>
                </div>
                <p className="text-sm text-red-500 mt-2 font-medium">잔여 차액: {formatMoney(stats.totalDiff)}</p>
              </div>
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center">
                <div className="flex items-center justify-between bg-blue-50 p-4 rounded-xl">
                   <span className="text-blue-800 font-medium">진행률</span>
                   <span className="text-blue-800 font-bold text-xl">
                     {stats.totalCause === 0 ? '0' : ((1 - stats.totalDiff / stats.totalCause) * 100).toFixed(1)}%
                   </span>
                </div>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="p-4 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-center space-y-3 sm:space-y-0 bg-gray-50/50">
                <div className="relative w-full sm:w-80">
                  <Icons.Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-4 h-4" />
                  <input 
                    type="text" 
                    placeholder="제목 또는 번호 검색..." 
                    className="pl-9 pr-4 py-2 w-full border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    value={filterText}
                    onChange={(e) => setFilterText(e.target.value)}
                  />
                </div>
                
                <label className="flex items-center space-x-2 cursor-pointer bg-white px-4 py-2 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                  <Icons.Filter className={`w-4 h-4 ${showOnlyDiff ? 'text-blue-600' : 'text-gray-400'}`} />
                  <span className="text-sm font-medium text-gray-700">차액 발생 항목만 보기</span>
                  <div className="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input 
                      type="checkbox" 
                      name="toggle" 
                      className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer focus:outline-none focus:ring-0 focus:ring-offset-0"
                      style={{ 
                        right: showOnlyDiff ? '0' : '1.25rem', 
                        borderColor: showOnlyDiff ? '#3b82f6' : '#d1d5db',
                        transition: 'right 0.2s, border-color 0.2s'
                      }}
                      checked={showOnlyDiff}
                      onChange={() => setShowOnlyDiff(!showOnlyDiff)}
                    />
                    <label 
                      className={`toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer ${showOnlyDiff ? 'bg-blue-500' : ''}`}
                      style={{ transition: 'background-color 0.2s' }}
                    ></label>
                  </div>
                </label>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left whitespace-nowrap">
                  <thead className="bg-gray-100 text-gray-600 uppercase text-xs">
                    <tr>
                      <th className="px-4 py-3 font-semibold rounded-tl-lg">상태</th>
                      <th className="px-4 py-3 font-semibold">번호</th>
                      <th className="px-4 py-3 font-semibold">일자</th>
                      <th className="px-4 py-3 font-semibold max-w-xs truncate">제목 (적요)</th>
                      <th className="px-4 py-3 font-semibold text-right">원인행위금액</th>
                      <th className="px-4 py-3 font-semibold text-right">결의확정액</th>
                      <th className="px-4 py-3 font-semibold text-right text-red-600 rounded-tr-lg">차액 (미결의액)</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {filteredData.length > 0 ? (
                      filteredData.map((row) => (
                        <tr 
                          key={row.id} 
                          className={`hover:bg-gray-50 transition-colors ${row.hasDiff ? 'bg-red-50/10' : ''}`}
                        >
                          <td className="px-4 py-3">
                            {row.hasDiff ? (
                              <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">
                                불일치
                              </span>
                            ) : (
                              <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">
                                완료
                              </span>
                            )}
                          </td>
                          <td className="px-4 py-3 text-gray-500">{row.no}</td>
                          <td className="px-4 py-3 text-gray-500">{row.date}</td>
                          <td className="px-4 py-3 text-gray-900 font-medium max-w-sm truncate" title={row.title}>
                            {row.title}
                          </td>
                          <td className="px-4 py-3 text-right text-gray-600">
                            {new Intl.NumberFormat('ko-KR').format(row.causeAmt)}
                          </td>
                          <td className="px-4 py-3 text-right text-gray-600">
                            {new Intl.NumberFormat('ko-KR').format(row.resAmt)}
                          </td>
                          <td className={`px-4 py-3 text-right font-bold ${row.hasDiff ? 'text-red-600' : 'text-gray-400'}`}>
                            {row.availAmt > 0 ? '+' : ''}{new Intl.NumberFormat('ko-KR').format(row.availAmt)}
                          </td>
                        </tr>
                      ))
                    ) : (
                      <tr>
                        <td colSpan="7" className="px-4 py-16 text-center text-gray-500">
                          <div className="flex flex-col items-center justify-center">
                            <Icons.CheckCircle className="w-12 h-12 text-gray-300 mb-3" />
                            <p className="text-lg">조건에 맞는 데이터가 없습니다.</p>
                            <p className="text-sm mt-1 text-gray-400">모든 원인행위가 지출결의 완료되었거나, 검색 결과가 없습니다.</p>
                          </div>
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
              
              <div className="bg-gray-50 px-4 py-3 border-t border-gray-100 text-xs text-gray-500 flex justify-between">
                <span>총 {filteredData.length}개의 항목이 표시됨</span>
                <span>데이터는 브라우저 내부에서만 처리되며 외부로 전송되지 않습니다.</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
